name: Workflow of exercise 2
run-name: Second workflow # Optional

# Events triggering the workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # allows to trigger the workflow manually from the GitHub UI


# Group of jobs to run as part of the workflow
jobs:
    ubuntu_job:
        runs-on: ubuntu-latest
        steps:
            - run: echo "Hello, I'm ubuntu-latest"
    macos_job:
        runs-on: macos-latest
        steps:
            - run: echo "Hello, I'm macos-latest"
    slow_job:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        steps:
            - run: echo "Hello, I'm a slow job"
            - run: sleep 30
    waiting-job:
        needs: slow_job
        runs-on: ubuntu-latest
        steps:
            - run: ls -l