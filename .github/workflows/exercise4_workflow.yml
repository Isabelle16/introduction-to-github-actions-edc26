name: Workflow of exercise 4
run-name: Fourth workflow # Optional

# Events triggering the workflow
on: [push]

# Group of jobs to run as part of the workflow
jobs:
    install-dependencies:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                python -m pip install -r requirements-dev.txt

    check-code-style:
        runs-on: ubuntu-latest
        needs: install-dependencies
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Check code style
              run: |
                python -m black mycode.py

    run-code:
        runs-on: ${{ matrix.os }}
        needs: [install-dependencies, check-code-style]
        strategy:
            fail-fast: false
            matrix:
                python-version: [3.12, 3.13, 3.14]
                os: [windows-latest, macos-latest]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Run tests
              run: |
                python -m pytest test_mycode.py