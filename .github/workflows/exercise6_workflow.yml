name: Workflow of exercise 6
run-name: Sixth workflow # Optional

# Events triggering the workflow
on: [push]

# Group of jobs to run as part of the workflow
jobs:
    create-pdf-from-markdown:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install pandoc
              run: |
                sudo apt-get update
                sudo apt-get install -y pandoc
            - name: Convert markdown to PDF
              run: | 
                pandoc --template eisvogel exercises.md -o exercises_new.pdf
            - name : Upload PDF as artifact
              uses: actions/upload-artifact@v3
              with:
                  name: exercises-pdf
                  path: exercises_new.pdf