name: Workflow of exercise 6
run-name: Sixth workflow # Optional

# Events triggering the workflow
on: [push]

# Group of jobs to run as part of the workflow
jobs:
    container-job:
        runs-on: ubuntu-latest
        container: python:3.14-slim
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install pandoc and LaTeX
              run: |
                apt-get update
                apt-get install -y pandoc texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra wget
            - name: Install eisvogel template
              run: |
                mkdir -p /root/.local/share/pandoc/templates
                wget https://github.com/Wandmalfarbe/pandoc-latex-template/releases/latest/download/Eisvogel.tar.gz
                tar -xzf Eisvogel.tar.gz
                mv eisvogel.latex /root/.local/share/pandoc/templates/eisvogel.latex
            - name: Convert markdown to PDF
              run: | 
                pandoc --template eisvogel exercises.md -o exercises_new.pdf
            - name : Upload PDF as artifact
              uses: actions/upload-artifact@v7
              with:
                  name: exercises-pdf
                  path: exercises_new.pdf